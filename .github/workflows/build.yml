name: Build LineageOS 23.2 for Galaxy S10

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Local Repository
      uses: actions/checkout@v4
      with:
        path: custom_config # Скачиваем ваши файлы в изолированную папку

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Clone LineageOS Core via Pure Git
      run: |
        # Скачиваем базовую среду сборки напрямую без использования утилиты repo
        git clone --depth=1 https://github.com -b lineage-23.2 lineage/build/make
        git clone --depth=1 https://github.com -b lineage-23.2 lineage/frameworks/base
        git clone --depth=1 https://github.com -b lineage-23.2 lineage/frameworks/base/packages/SystemUI

    - name: Clone Samsung S10 Device Trees via Pure Git
      run: |
        # Скачиваем конфигурацию железа, ядра и драйверов для вашей модели (beyond1lte)
        git clone --depth=1 https://github.com -b lineage-23.2 lineage/device/samsung/beyond1lte
        git clone --depth=1 https://github.com -b lineage-23.2 lineage/device/samsung/exynos9820-common
        git clone --depth=1 https://github.com -b lineage-23.2 lineage/kernel/samsung/exynos9820
        git clone --depth=1 https://github.com -b lineage-23.2 lineage/vendor/samsung/beyond1lte
        git clone --depth=1 https://github.com -b lineage-23.2 lineage/vendor/samsung/exynos9820-common
        git clone --depth=1 https://github.com -b lineage-23.2 lineage/hardware/samsung

    - name: Apply Custom Code Modifications
      run: |
        # Подменяем файлы интерфейса на ваши кастомные из папки custom_config
        cp -f custom_config/my_changes/dimens.xml lineage/frameworks/base/packages/SystemUI/res/values/dimens.xml
        cp -f custom_config/my_changes/activity_open_enter.xml lineage/frameworks/base/core/res/res/anim/activity_open_enter.xml
        cp -f custom_config/my_changes/activity_open_exit.xml lineage/frameworks/base/core/res/res/anim/activity_open_exit.xml

    - name: Start Build
      run: |
        cd lineage
        source build/envsetup.sh
        breakfast beyond1lte
        brunch beyond1lte

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-S10-Custom
        path: lineage/out/target/product/beyond1lte/*.zip
