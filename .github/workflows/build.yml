name: Build LineageOS 23.2 for Galaxy S10

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Local Repository
      uses: actions/checkout@v4
      with:
        path: custom_config

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 git-lfs

    - name: Initialize LineageOS Official Repo
      run: |
        mkdir lineage && cd lineage
        git config --global user.email "build@lineage.org"
        git config --global user.name "Builder"
        
        # Копируем наш локальный скрипт и даем ему права на запуск
        mkdir -p ~/bin
        cp ../custom_config/my_changes/repo ~/bin/repo
        chmod a+x ~/bin/repo
        
        # Обманываем систему инициализации, создавая локальную структуру
        mkdir -p .repo/manifests
        mkdir -p .repo/local_manifests
        cp ../custom_config/manifest.xml .repo/manifest.xml

    - name: Sync Source Code Official Mode
      run: |
        cd lineage
        # Вызываем локальный repo напрямую по его точному адресу
        ~/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Apply Custom Code Modifications
      run: |
        # Накатываем твои кастомные анимации и шторку
        cp -f custom_config/my_changes/dimens.xml lineage/frameworks/base/packages/SystemUI/res/values/dimens.xml
        cp -f custom_config/my_changes/activity_open_enter.xml lineage/frameworks/base/core/res/res/anim/activity_open_enter.xml
        cp -f custom_config/my_changes/activity_open_exit.xml lineage/frameworks/base/core/res/res/anim/activity_open_exit.xml

    - name: Start Build
      run: |
        cd lineage
        source build/envsetup.sh
        breakfast beyond1lte
        brunch beyond1lte

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-S10-Custom
        path: lineage/out/target/product/beyond1lte/*.zip
