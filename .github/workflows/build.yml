name: Build LineageOS 23.2 for Galaxy S10

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Local Repository
      uses: actions/checkout@v4
      with:
        path: custom_config

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Install Build Tools and Repo
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 repo

    - name: Initialize Repo via Local Manifest
      run: |
        mkdir lineage && cd lineage
        
        # Настраиваем профиль Git
        git config --global user.email "build@lineage.org"
        git config --global user.name "Builder"
        
        # Инициализируем repo, подсовывая ему твой личный манифест из папки конфигурации
        repo init -u ../custom_config -m manifest.xml --git-lfs --depth=1 --no-repo-verify

    - name: Sync Source Code
      run: |
        cd lineage
        # Теперь утилита видит файлы инициализации и начнет скачивание кода
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Apply Custom Code Modifications
      run: |
        # Подменяем файлы шторки и анимаций на твои кастомные
        cp -f custom_config/my_changes/dimens.xml lineage/frameworks/base/packages/SystemUI/res/values/dimens.xml
        cp -f custom_config/my_changes/activity_open_enter.xml lineage/frameworks/base/core/res/res/anim/activity_open_enter.xml
        cp -f custom_config/my_changes/activity_open_exit.xml lineage/frameworks/base/core/res/res/anim/activity_open_exit.xml

    - name: Start Build
      run: |
        cd lineage
        source build/envsetup.sh
        breakfast beyond1lte
        brunch beyond1lte

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-S10-Custom
        path: lineage/out/target/product/beyond1lte/*.zip
